# CartoGopher Configuration (Auto-generated)
# Tailored to your project based on detected files and directories.
# Edit freely — this file is only created once.

# Framework detection (auto|gin|chi|echo|fiber|nethttp|grpc|graphql|custom:<pkg>)
framework: auto

# Paths to ignore during analysis
# Directories discovered in your project are marked with (found)
ignore_paths:
  - ".git/"
  - "bakes/"
  - ".next/"  # Next.js build cache (found)
  - ".vercel/"  # Vercel deployment config (found)
  - "__tests__/"  # JavaScript/TypeScript test files (found)
  - "node_modules/"  # Node.js dependencies (found)
  - "*.test.go"
  - "*_test.go"
  - "testdata/"
  - "*.pyc"
  - "*.lock"

# Languages to analyze (detected from your project)
languages:
  html: true
  javascript: true
  typescript: true
  yaml: true
  docker: true

# Performance configuration
performance:
  max_workers: 0
  auto_detect_cpu: true
